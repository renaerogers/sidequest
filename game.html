<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrubby Quest</title>
    <link rel="stylesheet" href="game.css">
    <script src="pc-js/gamemoves.js" defer></script>
    <!-- <script src="pc-js/gamecollisions.js" defer></script> -->
    <script src="pc-js/gamemaps.js" defer></script>
    <script src="pc-js/gameportalcoordinates.js" defer></script>
</head>
<body>
    <header> 
        <h1><strong>Scrubby Quest</strong></h1>
        <p><strong>Use 'wasd' keys to move Scrubby around the map!</strong></p>
    </header>
    <main> 
        <button onclick="window.location.href='home.html'">Home</button>
        <div class="scrubby-animation">
            <div id="scrubby-block"></div>
            <img id="scrub_sit" src="images/scrubby_sit.png" alt="Scrubby Sitting">
            <img id="scrub_run_L1" src="images/scrubby_run_L1.png" alt="Scrubby Running Frame Left">
            <img id="scrub_run_L2" src="images/scrubby_run_L2.png" alt="Scrubby Running Frame Left">
            <img id="scrub_run_R1" src="images/scrubby_run_R1.png" alt="Scrubby Running Frame Right">
            <img id="scrub_run_R2" src="images/scrubby_run_R2.png" alt="Scrubby Running Frame Right">
            <img id="scrub_run_U1" src="images/scrubby_run_U1.png" alt="Scrubby Running Frame Up">
            <img id="scrub_run_U2" src="images/scrubby_run_U2.png" alt="Scrubby Running Frame Up">
            <img id="scrub_run_D1" src="images/scrubby_run_D1.png" alt="Scrubby Running Frame Down">
            <img id="scrub_run_D2" src="images/scrubby_run_D2.png" alt="Scrubby Running Frame Down">
        </div>
        <div class="map-container">
            <div class="map-collisions">
                <div id="point1"></div>
                <div id="point2"></div>
                <div id="point3"></div>
                <div id="point4"></div>
                <div id="point5"></div>
                <div id="point6"></div>
                <div id="point7"></div>
                <div id="point8"></div>
            </div>
        </div>
        <div class="map">
            <div class="library-container">
                <img id="map-library" src="images/map-scrubby-library.png" alt="Library Game Map">
                <div class="library-furnishings">
                    <img id="library-bookcases" src="images/m-library-bookcases.png" alt="Library Bookcases">
                    <img id="library-tables" src="images/m-library-tables.png" alt="Library Tables">
                    <img id="library-top-left-carpet" src="images/m-library-top-left-carpet.png" alt="Library Top Left Carpet">
                    <img id="library-top-right-carpet" src="images/m-library-top-right-carpet.png" alt="Library Top Right Carpet">
                    <img id="library-side-left-carpet" src="images/m-library-side-left-carpet.png" alt="Library Side Left Carpet">
                    <img id="library-side-right-carpet" src="images/m-library-side-right-carpet.png" alt="Library Side Right Carpet">
                </div>
            </div>
            <img id="map-maze" src="images/map-scrubby-maze.png" alt="Maze Game Map">
            <div class="maze-furnishings"> 
                <img id="maze-walls" src="images/m-maze-walls.png" alt="Maze Walls"> 
                <img id="top-left-teleport" src="images/m-maze-top-left-teleport.png" alt="Top Left Teleport">
                <img id="top-right-teleport" src="images/m-maze-top-right-teleport.png" alt="Top Right Teleport">
                <img id="bottom-left-teleport" src="images/m-maze-bottom-left-teleport.png" alt="Bottom Left Teleport">
                <img id="bottom-right-teleport" src="images/m-maze-bottom-right-teleport.png" alt="Bottom Right Teleport">
                <img id="open-chest-left" src="images/m-maze-open-chest-left.png" alt="Open Chest Left">
                <img id="open-chest-right" src="images/m-maze-open-chest-right.png" alt="Open Chest Right">
            </div>
            <img id="map-gallery" src="images/map-scrubby-gallery.png" alt="Gallery Game Map">
            <div class="gallery-furnishings"> 
                <img id="gallery-halls" src="images/m-gallery-halls.png" alt="Gallery Halls">
                <img id="gallery-plants" src="images/m-gallery-plants.png" alt="Gallery Plants">
                <img id="gallery-nice-ghosts1" src="images/m-gallery-nice-ghosts1.png" alt="Gallery Nice Ghosts 1">
                <div id="gallery-teleport-to" class="teleport"></div>
                <div id="gallery-teleport-from" class="teleport"></div>
            </div>
        </div>
        <div id="scrubby_identity">Scrubby is a dragon!!!!!</div>
    </main>
</body>
</html>
